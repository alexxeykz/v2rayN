name: release Windows

on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: false
        type: string
  push:
    branches:
      - master

env:
  OutputArch: "windows-64"
  OutputArchArm: "windows-arm64"
  OutputPath64:  "${{ github.workspace }}/v2rayN/Release/windows-64"
  OutputPathArm64:  "${{ github.workspace }}/v2rayN/Release/windows-arm64"

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: '8.0.x'

    - name: Build
      run: |
        cd v2rayN
        dotnet publish ./v2rayN/v2rayN.csproj     -c Release -r win-x64 -p:SelfContained=true -p:EnableWindowsTargeting=true -o $env:OutputPath64
        dotnet publish ./AmazTool/AmazTool.csproj -c Release -r win-x64 -p:SelfContained=true -p:EnableWindowsTargeting=true -p:PublishTrimmed=true -o $env:OutputPath64

    - name: Download xray-core
      run: |
        $release = Invoke-RestMethod "https://api.github.com/repos/XTLS/Xray-core/releases/latest"
        $version = $release.tag_name
        $url = "https://github.com/XTLS/Xray-core/releases/download/$version/Xray-windows-64.zip"
        Invoke-WebRequest $url -OutFile "$env:TEMP\xray.zip"
        Expand-Archive "$env:TEMP\xray.zip" -DestinationPath "$env:TEMP\xray"
        Copy-Item "$env:TEMP\xray\xray.exe" "$env:OutputPath64\xray.exe"
        Write-Host "Downloaded xray-core $version"

    - name: Build installer
      run: |
        choco install innosetup -y --no-progress
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "${{ github.workspace }}\stoun_installer.iss"

    - name: Upload installer
      uses: actions/upload-artifact@v7.0.0
      with:
        name: Stoun-Setup
        path: ${{ github.workspace }}\Output\Stoun-Setup.exe
    
    # release zip archive
    - name: Package release zip archive
      if: github.event.inputs.release_tag != ''
      run: |
        chmod 755 package-release-zip.sh
        ./package-release-zip.sh $OutputArch $OutputPath64
        ./package-release-zip.sh $OutputArchArm $OutputPathArm64
    
    - name: Upload zip archive to release
      uses: svenstaro/upload-release-action@v2
      if: github.event.inputs.release_tag != ''
      with:
        file: ${{ github.workspace }}/v2rayN*.zip
        tag: ${{ github.event.inputs.release_tag }}
        file_glob: true
        prerelease: true
